<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
    :root {
      --bg:#05010c; --accent:#8b5cf6; --accent2:#a78bfa; --pink:#d946ef;
      --text:#f0eaff; --text2:#b0a0cc; --text3:#685c82;
      --grad-text:linear-gradient(95deg,#a78bfa,#d946ef);
      --mono:'JetBrains Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;touch-action:none}
    body{font-family:var(--mono);background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;text-align:center;padding:24px}

    /* orbs */
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;
      animation:orb-drift 8s ease-in-out infinite alternate}
    .orb-1{width:400px;height:400px;top:-100px;left:-100px;
      background:radial-gradient(circle,rgba(82,15,168,.38),transparent 65%)}
    .orb-2{width:300px;height:300px;bottom:-80px;right:-80px;
      background:radial-gradient(circle,rgba(217,70,239,.22),transparent 65%);animation-delay:-4s}
    @keyframes orb-drift{from{transform:translate(0,0)}to{transform:translate(25px,16px)}}

    /* dot grid */
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(rgba(139,92,246,.1) 1px,transparent 1px);
      background-size:26px 26px}

    /* content */
    .wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:18px;max-width:440px}

    /* 404 glitch number */
    .err-num{font-size:clamp(80px,20vw,140px);font-weight:700;line-height:1;letter-spacing:-4px;
      background:var(--grad-text);-webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;position:relative;user-select:none;
      animation:fiu .5s ease .1s both}
    .err-num::before,.err-num::after{content:'404';position:absolute;top:0;left:0;
      background:var(--grad-text);-webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;opacity:.55}
    .err-num::before{animation:glitch-a 3.5s infinite steps(1)}
    .err-num::after{animation:glitch-b 3.5s infinite steps(1)}
    @keyframes glitch-a{0%,90%,100%{transform:translate(0);opacity:0}92%{transform:translate(-3px,1px);opacity:.6;filter:hue-rotate(90deg)}94%{transform:translate(3px,-1px);opacity:.4}97%{transform:translate(0);opacity:0}}
    @keyframes glitch-b{0%,88%,100%{transform:translate(0);opacity:0}90%{transform:translate(3px,1px);opacity:.5;filter:hue-rotate(-90deg)}93%{transform:translate(-2px,2px);opacity:.4}96%{transform:translate(0);opacity:0}}

    .err-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:99px;
      border:1px solid rgba(139,92,246,.38);background:rgba(139,92,246,.08);
      font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);
      animation:fiu .5s ease .18s both}
    .chip-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);
      box-shadow:0 0 8px var(--pink);animation:blink 1.5s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.18}}

    .err-title{font-size:clamp(18px,4vw,26px);font-weight:700;letter-spacing:-.4px;
      animation:fiu .5s ease .26s both}
    .err-sub{font-size:13.5px;color:var(--text2);line-height:1.7;max-width:380px;
      animation:fiu .5s ease .34s both}
    .err-sub code{font-family:var(--mono);font-size:12px;padding:2px 7px;border-radius:5px;
      background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);color:var(--accent2)}

    .err-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
      animation:fiu .5s ease .42s both}
    .btn-home,.btn-back{display:inline-flex;align-items:center;gap:7px;
      padding:10px 20px;border-radius:10px;font-family:var(--mono);
      font-size:12px;font-weight:700;cursor:pointer;transition:all .22s;text-decoration:none}
    .btn-home{background:linear-gradient(135deg,#520fa8,#d946ef);color:#fff;
      box-shadow:0 3px 16px rgba(82,15,168,.5)}
    .btn-home:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 6px 24px rgba(82,15,168,.65)}
    .btn-back{background:rgba(36,13,72,.55);border:1px solid rgba(139,92,246,.38);color:var(--accent2)}
    .btn-back:hover{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.55)}

    .err-footer{position:fixed;bottom:20px;font-size:10.5px;color:var(--text3);letter-spacing:.5px;
      animation:fiu .5s ease .5s both}
    .err-footer span{color:var(--accent2)}

    @keyframes fiu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
    <div class="err-num">404</div>

    <div class="err-chip">
        <span class="chip-dot"></span>
        PAGE_NOT_FOUND
    </div>

    <h1 class="err-title">Lost in the void.</h1>
    <p class="err-sub">
        The route <code id="missing-path">/unknown</code> doesn't exist on this server.
    </p>

    <div class="err-actions">
        <a href="/" class="btn-home">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Go Home
        </a>
        <a href="/docs" class="btn-back">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Browse Docs
        </a>
        <button class="btn-back" onclick="history.back()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Go Back
        </button>
    </div>
</div>

<p class="err-footer">Arvi API <span>v2.0.0</span> &nbsp;·&nbsp; HTTP <span>404</span> &nbsp;·&nbsp; <span id="err-time"></span></p>

<script>
    // show current path
    const path = window.location.pathname;
    const el   = document.getElementById('missing-path');
    if(el && path && path !== '/404.html' && path !== '/404') el.textContent = path;

    // clock
    function tick() {
        const e = document.getElementById('err-time');
        if(e) e.textContent = new Date().toLocaleTimeString('id-ID',{timeZone:'Asia/Jakarta',hour12:false}) + ' WIB';
    }
    tick(); setInterval(tick, 1000);
</script>
</body>
</html>
